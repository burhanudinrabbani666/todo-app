{% include 'layout.html' %}
<div class="container">
    <div class="card">
        <div class="card-header">Lets edit your todo!</div>
        <div class="card-body">
            <form id="editTodoForm">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input
                        type="text"
                        class="form-control"
                        name="title"
                        value="{{ todo.title }}"
                        id="title"
                        required
                    />
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <!-- prettier-ignore -->
                    <textarea name="description" id="description" rows="3" required class="form-control">{{ todo.description }}</textarea>
                </div>
                <div class="form-group">
                    <label for="priority">Priority</label>
                    <!-- prettier-ignore -->
                    <select  name="priority" id="priority" class="form-control">
                        <option {% if todo.priority == 1 %} selected="selected" {% endif %}>1</option>
                        <option {% if todo.priority == 2 %} selected="selected" {% endif %}>2</option>
                        <option {% if todo.priority == 3 %} selected="selected" {% endif %}>3</option>
                        <option {% if todo.priority == 4 %} selected="selected" {% endif %}>4</option>
                        <option {% if todo.priority == 5 %} selected="selected" {% endif %}>5</option>
                    </select>
                </div>

                <div class="form-group form-check">
                    <!-- prettier-ignore -->
                    <input 
                        id="complete" 
                        type="checkbox" 
                        class="form-check-input" 
                        name="complete" 
                        {% if todo.complete %} checked {% endif %}>
                    <label for="complete" class="form-check-label">Complete</label>
                </div>

                <button type="submit" class="btn btn-primary">Edit</button>
                <button id="deleteButton" type="button" class="btn btn-primary">
                    Delete
                </button>
                <a href="/todos/todo/page" class="btn btn-success">Back</a>
            </form>
        </div>
    </div>
</div>
