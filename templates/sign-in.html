{% include 'layout.html' %}
<div class="container">
    <div class="card">
        <div class="card-header">Login</div>
        <div class="card-body">
            <form action="" id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        class="form-control"
                        id="username"
                        name="username"
                        autocomplete="username"
                        required
                    />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        name="password"
                        id="password"
                        class="form-control"
                        autocomplete="current-password"
                        required
                    />
                </div>
                <button type="submit" class="btn btn-primary">Sign in</button>
            </form>
        </div>
        <div class="card-footer text-muted">
            <a href="/auth/sign-up-page">dont have any account? Lets Sign up..</a>
        </div>
    </div>
</div>
