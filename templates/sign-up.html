{% include 'layout.html' %}
<div class="container">
    <div class="card">
        <div class="card-header">Register</div>
        <div class="card-body">
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="email">Email</label>
                        <input
                            id="email"
                            type="email"
                            class="form-control"
                            name="email"
                            required
                            autocomplete="email"
                        />
                    </div>
                    <div class="form-group col-md-6">
                        <label for="username">Username</label>
                        <input
                            id="username"
                            type="text"
                            class="form-control"
                            name="username"
                            required
                            autocomplete="username"
                        />
                    </div>
                    <div class="form-group col-md-6">
                        <label for="firstname">First Name</label>
                        <input
                            id="firstname"
                            type="text"
                            class="form-control"
                            name="firstname"
                            required
                            autocomplete="firstname"
                        />
                    </div>
                    <div class="form-group col-md-6">
                        <label for="lastname">Last Name</label>
                        <input
                            type="text"
                            class="form-control"
                            name="lastname"
                            required
                            autocomplete="lastname"
                        />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="role">Role</label>
                        <input
                            id="role"
                            type="text"
                            class="form-control"
                            name="role"
                            required
                        />
                    </div>
                    <div class="form-group col-md-6">
                        <label for="phonenumber">Phone number</label>
                        <input
                            id="phonenumber"
                            type="number"
                            class="form-control"
                            name="phone_number"
                            autocomplete="phone_number"
                            required
                        />
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        class="form-control"
                        autocomplete="new-password"
                        name="password"
                        id="password"
                        required
                    />
                </div>
                <div class="form-group">
                    <label for="verifypassword">Verify Password</label>
                    <input
                        type="password"
                        class="form-control"
                        autocomplete="new-password"
                        name="password2"
                        id="verifypassword"
                        required
                    />
                </div>
                <button type="submit" class="btn btn-primary">Sign in</button>
            </form>
        </div>
        <div class="card-footer text-muted">
            <a href="/auth/sign-in-page">Already have an account?</a>
        </div>
    </div>
</div>
